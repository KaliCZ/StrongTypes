<svg class="dark" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 470" role="img" aria-label="StrongTypes NuGet package layout">
  <style>
    .core-title   { font: 700 15px ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; fill: #111827; }
    .card-title   { font: 600 13px ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; fill: #111827; }
    .niche-title  { font: 600 12.5px ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; fill: #6B7280; }
    .group-label  { font: 600 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #6B7280; letter-spacing: 1.2px; }

    .body         { font: 13px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #374151; }
    .body-mono    { font: 13px ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; fill: #374151; }
    .sub-body     { font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #6B7280; }
    .sub-mono     { font: 12px ui-monospace, SFMono-Regular, 'SF Mono', Menlo, Consolas, monospace; fill: #6B7280; }
    .card-body    { font: 12px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #374151; }
    .niche-body   { font: 11.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #6B7280; }
    .niche-tag    { font: italic 10.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #9CA3AF; }
    .card-note    { font: italic 11px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #6B7280; }
    .cta-text     { font: italic 11.5px -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; fill: #6366F1; }

    .bullet       { fill: #6366F1; }
    .sub-bullet   { fill: none; stroke: #9CA3AF; stroke-width: 1.2; }
    .sm-bullet    { fill: #9CA3AF; }
    .niche-bullet { fill: #9CA3AF; opacity: 0.7; }

    .core-bg      { fill: #EEF2FF; }
    .core-border  { stroke: #6366F1; }
    .card-bg      { fill: #FFFFFF; }
    .card-border  { stroke: #E5E7EB; }
    .group-bg     { fill: #F9FAFB; }
    .group-border { stroke: #D1D5DB; stroke-dasharray: 6 4; }
    .niche-bg     { fill: none; }
    .niche-border { stroke: #9CA3AF; stroke-dasharray: 4 3; }
    .arrow-line   { stroke: #6B7280; }

    :where(.dark) {
      .core-bg      { fill: #1a1d40; }
      .core-border  { stroke: #818CF8; }
      .card-bg      { fill: #161b22; }
      .card-border  { stroke: #30363d; }
      .group-bg     { fill: #11161d; }
      .group-border { stroke: #30363d; }
      .niche-bg     { fill: none; }
      .niche-border { stroke: #545b66; }
      .arrow-line   { stroke: #8b949e; }

      .core-title  { fill: #e6edf3; }
      .card-title  { fill: #e6edf3; }
      .niche-title { fill: #8b949e; }
      .group-label { fill: #8b949e; }
      .body        { fill: #c9d1d9; }
      .body-mono   { fill: #c9d1d9; }
      .sub-body    { fill: #8b949e; }
      .sub-mono    { fill: #8b949e; }
      .card-body   { fill: #c9d1d9; }
      .niche-body  { fill: #8b949e; }
      .niche-tag   { fill: #6e7681; }
      .card-note   { fill: #8b949e; }
      .cta-text    { fill: #A5B4FC; }

      .bullet       { fill: #A5B4FC; }
      .sub-bullet   { stroke: #6e7681; }
      .sm-bullet    { fill: #8b949e; }
      .niche-bullet { fill: #6e7681; }
    }
  </style>

  <defs>
    <marker id="pl-arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0,0 L 9,3 L 0,6 z" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- ========================================================== -->
  <!-- Core card (top-left) — the only required package           -->
  <!-- ========================================================== -->
  <rect class="core-bg core-border" x="15" y="15" width="380" height="245" rx="8" stroke-width="1.5"/>
  <text class="core-title" x="33" y="42">Kalicz.StrongTypes</text>
  <text class="sub-body"  x="33" y="60">Core package — always required.</text>

  <circle class="bullet" cx="41" cy="86" r="2.5"/>
  <text class="body-mono" x="51" y="90">Maybe&lt;T&gt;<tspan class="body"> + JSON converter</tspan></text>

  <circle class="bullet" cx="41" cy="109" r="2.5"/>
  <text class="body-mono" x="51" y="113">Result&lt;T&gt; / Result&lt;T, TError&gt;</text>

  <circle class="bullet" cx="41" cy="132" r="2.5"/>
  <text class="body" x="51" y="136">Validated types<tspan class="sub-body"> (with JSON converters)</tspan></text>

  <circle class="sub-bullet" cx="70" cy="155" r="2.3"/>
  <text class="sub-mono" x="81" y="159">NonEmptyString, Email, Digit</text>

  <circle class="sub-bullet" cx="70" cy="176" r="2.3"/>
  <text class="sub-mono" x="81" y="180">NonEmptyEnumerable&lt;T&gt;</text>

  <circle class="sub-bullet" cx="70" cy="197" r="2.3"/>
  <text class="sub-body" x="81" y="201">Numeric wrappers <tspan font-family="ui-monospace, Menlo, Consolas, monospace">(Positive&lt;T&gt;, …)</tspan></text>

  <circle class="sub-bullet" cx="70" cy="218" r="2.3"/>
  <text class="sub-body" x="81" y="222">All types implement <tspan font-family="ui-monospace, Menlo, Consolas, monospace">IParsable&lt;T&gt;</tspan></text>

  <!-- ========================================================== -->
  <!-- Web / API surface (top-right) — Swashbuckle, Microsoft,    -->
  <!-- AspNetCore (niche)                                         -->
  <!-- ========================================================== -->
  <rect class="group-bg group-border" x="415" y="15" width="390" height="245" rx="10" stroke-width="1.2"/>
  <text class="group-label" x="430" y="34">WEB / API SURFACE</text>

  <!-- Swashbuckle (top — preferred) -->
  <rect class="card-bg card-border" x="425" y="48" width="370" height="62" rx="6" stroke-width="1.5"/>
  <text class="card-title" x="439" y="69">Kalicz.StrongTypes.OpenApi.Swashbuckle</text>
  <circle class="sm-bullet" cx="445" cy="91" r="2"/>
  <text class="card-body" x="453" y="95">Schema filters for <tspan font-family="ui-monospace, Menlo, Consolas, monospace">AddSwaggerGen()</tspan></text>

  <!-- Microsoft (mid — has "not recommended" tag) -->
  <rect class="card-bg card-border" x="425" y="120" width="370" height="62" rx="6" stroke-width="1.5"/>
  <text class="card-title" x="439" y="141">Kalicz.StrongTypes.OpenApi.Microsoft</text>
  <text class="niche-tag"  x="785" y="141" text-anchor="end">not recommended</text>
  <circle class="sm-bullet" cx="445" cy="163" r="2"/>
  <text class="card-body" x="453" y="167">Schema transformers for <tspan font-family="ui-monospace, Menlo, Consolas, monospace">AddOpenApi()</tspan></text>

  <!-- AspNetCore (bottom — niche, dashed, muted) -->
  <rect class="niche-bg niche-border" x="425" y="192" width="370" height="62" rx="6" stroke-width="1.2"/>
  <text class="niche-title" x="439" y="213">Kalicz.StrongTypes.AspNetCore</text>
  <text class="niche-tag"   x="785" y="213" text-anchor="end">rarely needed</text>
  <circle class="niche-bullet" cx="445" cy="235" r="1.8"/>
  <text class="niche-body" x="453" y="239"><tspan font-family="ui-monospace, Menlo, Consolas, monospace">Maybe&lt;T&gt;</tspan> / <tspan font-family="ui-monospace, Menlo, Consolas, monospace">NonEmptyEnumerable&lt;T&gt;</tspan> binders from forms</text>

  <!-- ========================================================== -->
  <!-- Utility packages (bottom-left) — EfCore + FsCheck stacked  -->
  <!-- ========================================================== -->
  <rect class="group-bg group-border" x="15" y="285" width="380" height="160" rx="10" stroke-width="1.2"/>
  <text class="group-label" x="30" y="304">UTILITY PACKAGES</text>

  <!-- EfCore -->
  <rect class="card-bg card-border" x="25" y="318" width="360" height="55" rx="6" stroke-width="1.5"/>
  <text class="card-title" x="39" y="338">Kalicz.StrongTypes.EfCore</text>
  <circle class="sm-bullet" cx="45" cy="358" r="2"/>
  <text class="card-body" x="53" y="362">Value converters &amp; <tspan font-family="ui-monospace, Menlo, Consolas, monospace">.Unwrap()</tspan> for complex queries</text>

  <!-- FsCheck -->
  <rect class="card-bg card-border" x="25" y="383" width="360" height="55" rx="6" stroke-width="1.5"/>
  <text class="card-title" x="39" y="403">Kalicz.StrongTypes.FsCheck</text>
  <text class="card-note"  x="375" y="403" text-anchor="end">property-based testing</text>
  <circle class="sm-bullet" cx="45" cy="423" r="2"/>
  <text class="card-body" x="53" y="427">Predefined value generators</text>

  <!-- ========================================================== -->
  <!-- App surface (bottom-right) — currently just WPF            -->
  <!-- ========================================================== -->
  <rect class="group-bg group-border" x="415" y="285" width="390" height="160" rx="10" stroke-width="1.2"/>
  <text class="group-label" x="430" y="304">APP SURFACE</text>

  <!-- WPF -->
  <rect class="card-bg card-border" x="425" y="318" width="370" height="55" rx="6" stroke-width="1.5"/>
  <text class="card-title" x="439" y="338">Kalicz.StrongTypes.Wpf</text>
  <circle class="sm-bullet" cx="445" cy="358" r="2"/>
  <text class="card-body" x="453" y="362">Two-way MVVM binding</text>

  <!-- CTA: invite issues for other UI frameworks -->
  <a href="https://github.com/KaliCZ/StrongTypes/issues/new" target="_blank">
    <text class="cta-text" x="610" y="415" text-anchor="middle">Want WinForms, MAUI, or Avalonia?</text>
    <text class="cta-text" x="610" y="432" text-anchor="middle">Open a GitHub issue →</text>
  </a>

  <!-- ========================================================== -->
  <!-- Arrows — every group depends on Core                       -->
  <!-- ========================================================== -->
  <line class="arrow-line" x1="415" y1="137" x2="397" y2="137" stroke-width="1.5" marker-end="url(#pl-arrow)"/>
  <line class="arrow-line" x1="200" y1="285" x2="200" y2="265" stroke-width="1.5" marker-end="url(#pl-arrow)"/>
  <line class="arrow-line" x1="610" y1="285" x2="397" y2="265" stroke-width="1.5" marker-end="url(#pl-arrow)"/>
</svg>
