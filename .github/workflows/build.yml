name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration $config --no-restore

    - name: Test
      run: dotnet test --no-restore --no-build --configuration $config

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-logs
        path: |
          **/TestResults/**/*.log
          **/TestResults/**/*.trx
        retention-days: 5

  publish:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: Nuget.org

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Parse version from tag
      id: version
      run: |
        TAG="${GITHUB_REF_NAME}"
        echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

    - name: Pack
      env:
        NOTES: ${{ github.event.release.body }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        dotnet pack ./src/StrongTypes/StrongTypes.csproj \
          -c $config -o out \
          -p:Version="$VERSION" \
          -p:PackageReleaseNotes="$NOTES"
        dotnet pack ./src/StrongTypes.EfCore/StrongTypes.EfCore.csproj \
          -c $config -o out \
          -p:Version="$VERSION" \
          -p:PackageReleaseNotes="$NOTES"

    - name: Publish packages
      run: dotnet nuget push ./out/*.nupkg --source nuget.org --api-key ${{ secrets.NUGET_TOKEN }}
