name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration $config --no-restore

    - name: Test
      run: dotnet test --no-restore --no-build --configuration $config

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-logs
        path: |
          **/TestResults/**/*.log
          **/TestResults/**/*.trx
        retention-days: 5

  publish:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: Nuget.org

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Parse version from tag
      id: version
      run: |
        TAG="${GITHUB_REF_NAME}"
        echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

    # GeneratePackageOnBuild=true in the csproj files means `dotnet build`
    # produces the nupkg as a side-effect; no separate `dotnet pack` step
    # needed. -p:Version cascades into referenced projects (EfCore's
    # ProjectReference to core), so EfCore's nuspec pins its core
    # dependency to the same version.
    # Loop: skip projects that don't exist yet (e.g. FsCheck until #40 lands).
    # When a new publishable package is added, just add its csproj to the list.
    - name: Build and pack
      env:
        NOTES: ${{ github.event.release.body }}
        VERSION: ${{ steps.version.outputs.version }}
      run: |
        for PROJECT in \
          ./src/StrongTypes/StrongTypes.csproj \
          ./src/StrongTypes.EfCore/StrongTypes.EfCore.csproj \
          ./src/StrongTypes.FsCheck/StrongTypes.FsCheck.csproj; do
          if [ -f "$PROJECT" ]; then
            dotnet build "$PROJECT" \
              -c $config \
              -p:Version="$VERSION" \
              -p:PackageReleaseNotes="$NOTES" \
              -p:PackageOutputPath="$PWD/out"
          else
            echo "Skipping $PROJECT (not present in repo)"
          fi
        done

    - name: Publish packages
      run: dotnet nuget push ./out/*.nupkg --source nuget.org --api-key ${{ secrets.NUGET_TOKEN }}
