name: build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration $config --no-restore

    - name: Test
      run: dotnet test --no-restore --no-build --configuration $config

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-logs
        path: |
          **/TestResults/**/*.log
          **/TestResults/**/*.trx
        retention-days: 5

  publish:
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    environment: Nuget.org

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Parse tag
      id: parse
      run: |
        TAG="${GITHUB_REF_NAME}"
        case "$TAG" in
          core-v*)
            PROJECT=src/StrongTypes/StrongTypes.csproj
            PACKAGE=Kalicz.StrongTypes
            VERSION="${TAG#core-v}"
            ;;
          efcore-v*)
            PROJECT=src/StrongTypes.EfCore/StrongTypes.EfCore.csproj
            PACKAGE=Kalicz.StrongTypes.EfCore
            VERSION="${TAG#efcore-v}"
            ;;
          *)
            echo "Unknown tag prefix: $TAG. Expected one of: core-v*, efcore-v*." >&2
            exit 1
            ;;
        esac
        echo "project=$PROJECT" >> "$GITHUB_OUTPUT"
        echo "package=$PACKAGE" >> "$GITHUB_OUTPUT"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"

    # GeneratePackageOnBuild=true in the csproj files means `dotnet build`
    # produces the nupkg as a side-effect; no separate `dotnet pack` step
    # needed. The -p:Version cascades into referenced projects (e.g., EfCore's
    # ProjectReference to core), so the resulting nuspec pins its core
    # dependency to the same version as the tag.
    - name: Build and pack
      env:
        NOTES: ${{ github.event.release.body }}
        PROJECT: ${{ steps.parse.outputs.project }}
        VERSION: ${{ steps.parse.outputs.version }}
      run: |
        dotnet build "$PROJECT" \
          -c $config \
          -p:Version="$VERSION" \
          -p:PackageReleaseNotes="$NOTES" \
          -p:PackageOutputPath="$PWD/out"

    # Push only the target package; building a dependent (e.g., EfCore) also
    # emits the referenced core nupkg into out/, which we must not republish.
    - name: Publish package
      env:
        PACKAGE: ${{ steps.parse.outputs.package }}
        VERSION: ${{ steps.parse.outputs.version }}
      run: dotnet nuget push "./out/${PACKAGE}.${VERSION}.nupkg" --source nuget.org --api-key ${{ secrets.NUGET_TOKEN }}
