name: build-and-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  checks: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      
    defaults:
      run:
        working-directory: src
        
    steps:
    - name: Checkout
      uses: actions/checkout@v3
    
    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Clean
      run: dotnet clean ./StrongTypes.sln --configuration $config && dotnet nuget locals all --clear

    - name: Install dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration $config --no-restore
    
    - name: Test
      run: dotnet test --no-restore --no-build --configuration $config --logger "trx;LogFileName=test-results.trx" || true

    - name: Pack
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: dotnet pack ./StrongTypes/StrongTypes.csproj -c $config --no-build -o out

    - name: Upload NuGet package
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: src/out/*.nupkg
        retention-days: 1

    - name: Test Report
      uses: dorny/test-reporter@3eeb9fc888e82e8be2fb356bbeec2750231672bc  # v1
      if: success() || failure()
      with:
        name: StrongTypes Tests report
        path: "**/test-results.trx"
        reporter: dotnet-trx
        fail-on-error: true

  publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Nuget.org

    steps:
    - name: Download NuGet package
      uses: actions/download-artifact@v4
      with:
        name: nuget-package

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish packages
      run: dotnet nuget push ./*.nupkg --skip-duplicate --source nuget.org --api-key ${{secrets.NUGET_TOKEN}}
