name: build-and-test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    env:
      config: 'Release'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true
      
    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore

    - name: Build
      run: dotnet build --configuration $config --no-restore

    - name: Test
      run: dotnet test --no-restore --no-build --configuration $config --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: test-results
        path: ./test-results/**/*.trx
        retention-days: 5

    - name: Pack
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: dotnet pack ./src/StrongTypes/StrongTypes.csproj -c $config --no-build -o out

    - name: Upload NuGet package
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: actions/upload-artifact@v7
      with:
        name: nuget-package
        path: out/*.nupkg
        retention-days: 1

  publish:
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: Nuget.org

    steps:
    - name: Download NuGet package
      uses: actions/download-artifact@v8
      with:
        name: nuget-package

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Publish packages
      run: dotnet nuget push ./*.nupkg --skip-duplicate --source nuget.org --api-key ${{secrets.NUGET_TOKEN}}
