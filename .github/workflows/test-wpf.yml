name: test-wpf

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: windows-latest

    env:
      config: 'Debug'
      DOTNET_NOLOGO: true
      DOTNET_CLI_TELEMETRY_OPTOUT: true

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET 10
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: 10.0.x

    - name: Restore
      run: dotnet restore src/StrongTypes.Wpf.Tests/StrongTypes.Wpf.Tests.csproj

    - name: Build
      run: dotnet build src/StrongTypes.Wpf.Tests/StrongTypes.Wpf.Tests.csproj --configuration ${{ env.config }} --no-restore

    - name: Test
      run: dotnet test src/StrongTypes.Wpf.Tests/StrongTypes.Wpf.Tests.csproj --no-restore --no-build --configuration ${{ env.config }}

    - name: Upload test logs
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: wpf-test-logs
        path: |
          src/StrongTypes.Wpf.Tests/**/TestResults/**/*.log
          src/StrongTypes.Wpf.Tests/**/TestResults/**/*.trx
        retention-days: 5
